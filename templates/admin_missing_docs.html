<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missing Documents | AssiScan Admin</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SheetJS for Excel export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f3d576;
            --gold-dark: #b8941c;
            --dark-red: #331010;
            --bg-dark: #050101;
            --bg-darker: #030000;
            --bg-card: rgba(20, 5, 5, 0.7);
            --bg-hover: rgba(212, 175, 55, 0.1);
            --text-light: #f0f0f0;
            --text-muted: #888;
            --border-color: rgba(212, 175, 55, 0.3);
            --border-radius: 8px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.7);
            --transition: all 0.3s ease;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --info: #17a2b8;
            
            /* Document colors */
            --doc-psa: #4a6fa5;
            --doc-f137: #d4af37;
            --doc-gm: #55a630;
            --doc-hd: #6f42c1;
            --doc-tc: #6f42c1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 50%, #1a0505 0%, #000000 100%);
            color: var(--text-light);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: black;
            box-shadow: var(--shadow);
        }

        .logo-text h1 {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            color: var(--gold);
            margin-bottom: 4px;
        }

        .logo-text p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-light);
            text-decoration: none;
            border-radius: var(--border-radius);
            transition: var(--transition);
            font-size: 13px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .nav-link:hover {
            background: var(--bg-hover);
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .nav-link.active {
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
            border-color: var(--gold);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
            background: rgba(20, 5, 5, 0.7);
            border-radius: var(--border-radius);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-weight: 600;
        }

        /* Page Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-title {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats-cards {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: var(--transition);
        }

        .stat-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .stat-icon.total {
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
        }

        .stat-icon.urgent {
            background: rgba(244, 67, 54, 0.15);
            color: #f44336;
        }

        .stat-info h3 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-light);
        }

        .stat-info p {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
            background: var(--bg-card);
            padding: 15px 20px;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            padding-right: 40px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            border-radius: var(--border-radius);
            font-size: 13px;
            outline: none;
            transition: var(--transition);
        }

        .search-box input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            border-radius: var(--border-radius);
            font-size: 12px;
            cursor: pointer;
            outline: none;
            min-width: 150px;
        }

        .filter-select:focus {
            border-color: var(--gold);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--border-radius);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-light);
            border: 1px solid var(--border-color);
        }

        .btn:hover {
            background: var(--bg-hover);
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .btn-warning {
            background: rgba(255, 152, 0, 0.15);
            color: #ff9800;
            border-color: #ff9800;
        }

        .btn-warning:hover {
            background: #ff9800;
            color: black;
        }

        .btn-success {
            background: rgba(40, 167, 69, 0.15);
            color: #28a745;
            border-color: #28a745;
        }

        .btn-success:hover {
            background: #28a745;
            color: white;
        }

        /* Students Grid */
        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .student-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            overflow: hidden;
            transition: var(--transition);
            backdrop-filter: blur(5px);
        }

        .student-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: var(--shadow-lg);
        }

        .student-card-header {
            padding: 20px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(20, 5, 5, 0.5) 100%);
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .student-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            font-weight: 600;
        }

        .student-info h3 {
            font-size: 16px;
            margin-bottom: 5px;
            color: var(--text-light);
        }

        .student-meta {
            display: flex;
            gap: 15px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .student-meta i {
            margin-right: 3px;
            color: var(--gold);
        }

        .student-card-body {
            padding: 20px;
        }

        .missing-docs-list {
            margin-bottom: 15px;
        }

        .missing-doc-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            margin-bottom: 8px;
            border-left: 3px solid;
            transition: var(--transition);
        }

        .missing-doc-item:hover {
            background: rgba(0, 0, 0, 0.4);
        }

        .doc-icon {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .doc-icon.psa {
            background: rgba(74, 111, 165, 0.15);
            color: #8cb4f5;
        }

        .doc-icon.f137 {
            background: rgba(212, 175, 55, 0.15);
            color: #f3d576;
        }

        .doc-icon.gm {
            background: rgba(85, 166, 48, 0.15);
            color: #80b918;
        }

        .doc-icon.hd {
            background: rgba(111, 66, 193, 0.15);
            color: #b5a0ff;
        }

        .doc-icon.tc {
            background: rgba(111, 66, 193, 0.15);
            color: #b5a0ff;
        }

        .doc-info {
            flex: 1;
        }

        .doc-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 2px;
        }

        .doc-desc {
            font-size: 10px;
            color: var(--text-muted);
        }

        .missing-count {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 12px;
            background: rgba(244, 67, 54, 0.15);
            color: #f44336;
            border: 1px solid #f44336;
        }

        .student-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .last-updated {
            font-size: 10px;
            color: var(--text-muted);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-muted);
            font-size: 12px;
        }

        .action-btn:hover {
            transform: scale(1.1);
        }

        .btn-email:hover {
            background: var(--info);
            color: white;
            border-color: var(--info);
        }

        .btn-remind:hover {
            background: #ff9800;
            color: black;
            border-color: #ff9800;
        }

        .btn-view:hover {
            background: var(--gold);
            color: black;
            border-color: var(--gold);
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            background: var(--bg-card);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            color: rgba(212, 175, 55, 0.3);
        }

        .empty-state h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .empty-state p {
            max-width: 400px;
            margin: 0 auto 20px;
            line-height: 1.6;
        }

        .empty-state .btn {
            margin: 0 auto;
            display: inline-flex;
        }

        /* Loading State */
        .loading-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--gold);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(212, 175, 55, 0.3);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Notification Toast */
        .notification-toast {
            position: fixed;
            top: 30px;
            right: 30px;
            padding: 15px 20px;
            border-radius: var(--border-radius);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-lg);
            z-index: 1100;
            transform: translateX(400px);
            transition: transform 0.4s ease;
            max-width: 400px;
            background: rgba(40, 167, 69, 0.9);
            color: white;
            border: 1px solid #28a745;
            backdrop-filter: blur(5px);
        }

        .notification-toast.show {
            transform: translateX(0);
        }

        .notification-toast.error {
            background: rgba(220, 53, 69, 0.9);
            border-color: #dc3545;
        }

        .notification-toast.warning {
            background: rgba(255, 152, 0, 0.9);
            border-color: #ff9800;
            color: black;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .students-grid {
                grid-template-columns: 1fr;
            }

            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                min-width: auto;
            }

            .filter-group {
                flex-direction: column;
            }

            .filter-select {
                width: 100%;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats-cards {
                width: 100%;
            }

            .stat-card {
                flex: 1;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .student-card-header {
                flex-direction: column;
                text-align: center;
            }

            .student-meta {
                justify-content: center;
            }

            .student-footer {
                flex-direction: column;
                gap: 10px;
            }

            .action-buttons {
                width: 100%;
                justify-content: center;
            }

            .stats-cards {
                flex-direction: column;
            }

            .stat-card {
                width: 100%;
            }
        }

        /* Touch-friendly */
        button, 
        .btn,
        .action-btn,
        .nav-link,
        .filter-select {
            min-height: 44px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.5);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(212, 175, 55, 0.7);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-container">
                <div class="logo-icon">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <div class="logo-text">
                    <h1>Missing Documents</h1>
                    <p>Track incomplete requirements</p>
                </div>
            </div>
            <div class="nav-links">
                <a href="/admin/dashboard" class="nav-link">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/admin/users" class="nav-link">
                    <i class="fas fa-users"></i>
                    <span>Users</span>
                </a>
                <a href="/admin/colleges" class="nav-link">
                    <i class="fas fa-university"></i>
                    <span>Colleges</span>
                </a>
                <a href="/history.html" class="nav-link">
                    <i class="fas fa-database"></i>
                    <span>Records</span>
                </a>
                <a href="/admin/missing-documents" class="nav-link active">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>Missing Docs</span>
                </a>
                <a href="#" onclick="logout()" class="nav-link">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </div>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">A</div>
                <div>
                    <div id="userName">Loading...</div>
                    <div style="font-size: 10px; color: var(--text-muted);">Super Admin</div>
                </div>
            </div>
        </header>

        <!-- Page Header -->
        <div class="page-header">
            <div class="page-title">
                <i class="fas fa-exclamation-triangle" style="color: #ff9800;"></i>
                Students with Missing Documents
            </div>
            <div class="stats-cards">
                <div class="stat-card">
                    <div class="stat-icon total">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="totalStudents">0</h3>
                        <p>Total Students</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon urgent">
                        <i class="fas fa-exclamation-circle"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="urgentCases">0</h3>
                        <p>Urgent (3+ missing)</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="action-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by name, LRN, or college...">
            </div>
            <div class="filter-group">
                <select id="docTypeFilter" class="filter-select">
                    <option value="">All Document Types</option>
                    <option value="psa">PSA Birth Certificate</option>
                    <option value="form137">Form 137</option>
                    <option value="goodmoral">Good Moral Certificate</option>
                    <option value="honorable_dismissal">Honorable Dismissal</option>
                    <option value="transfer_credentials">Transfer Credentials</option>
                </select>
                <select id="collegeFilter" class="filter-select">
                    <option value="">All Colleges</option>
                </select>
                <button class="btn btn-warning" onclick="sendBulkReminders()">
                    <i class="fas fa-bell"></i> Send Reminders
                </button>
                <button class="btn btn-success" onclick="exportList()">
                    <i class="fas fa-download"></i> Export List
                </button>
            </div>
        </div>

        <!-- Students Grid -->
        <div class="students-grid" id="studentsGrid">
            <!-- Students will be loaded here -->
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading students with missing documents...</p>
            </div>
        </div>

        <!-- Notification Toast -->
        <div id="notificationToast" class="notification-toast">
            <i class="fas fa-check-circle"></i>
            <span id="toastMessage">Success!</span>
        </div>
    </div>

    <script>
        // ==================== GLOBAL VARIABLES ====================
        let studentsData = [];
        let filteredStudents = [];
        let collegesData = [];
        let userData = {};

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            loadColleges();
            loadMissingDocuments();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('searchInput')?.addEventListener('input', applyFilters);
            document.getElementById('docTypeFilter')?.addEventListener('change', applyFilters);
            document.getElementById('collegeFilter')?.addEventListener('change', applyFilters);
            
            // Handle enter key in search
            document.getElementById('searchInput')?.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    applyFilters();
                }
            });
        }

        // ==================== AUTHENTICATION ====================
        async function checkAuth() {
            try {
                const response = await fetch('/api/check-session');
                const data = await response.json();
                
                if (!data.authenticated) {
                    window.location.href = '/login';
                    return;
                }
                
                if (data.user.role !== 'SUPER_ADMIN') {
                    window.location.href = '/';
                    return;
                }
                
                userData = data.user;
                document.getElementById('userName').textContent = userData.full_name || userData.username;
                
                const initials = (userData.full_name || userData.username).split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                document.getElementById('userAvatar').textContent = initials;
                
            } catch (error) {
                console.error('Auth error:', error);
                window.location.href = '/login';
            }
        }

        // ==================== LOAD DATA ====================
        async function loadColleges() {
            try {
                const response = await fetch('/api/colleges-dropdown');
                if (response.ok) {
                    collegesData = await response.json();
                    populateCollegeFilter();
                }
            } catch (error) {
                console.error('Error loading colleges:', error);
            }
        }

        function populateCollegeFilter() {
            const filter = document.getElementById('collegeFilter');
            filter.innerHTML = '<option value="">All Colleges</option>';
            
            collegesData.forEach(college => {
                const option = document.createElement('option');
                option.value = college.name;
                option.textContent = `${college.code} - ${college.name}`;
                filter.appendChild(option);
            });
        }

        async function loadMissingDocuments() {
            const grid = document.getElementById('studentsGrid');
            
            try {
                const response = await fetch('/api/missing-documents');
                
                if (response.ok) {
                    const data = await response.json();
                    studentsData = data.students || [];
                    filteredStudents = [...studentsData];
                    
                    updateStats();
                    renderStudents();
                } else {
                    const error = await response.json();
                    grid.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h3>Failed to Load</h3>
                            <p>${error.error || 'Unable to load missing documents data.'}</p>
                            <button class="btn btn-warning" onclick="loadMissingDocuments()">
                                <i class="fas fa-sync-alt"></i> Retry
                            </button>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading missing documents:', error);
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Connection Error</h3>
                        <p>Unable to connect to the server. Please check your connection.</p>
                        <button class="btn btn-warning" onclick="loadMissingDocuments()">
                            <i class="fas fa-sync-alt"></i> Retry
                        </button>
                    </div>
                `;
            }
        }

        // ==================== UPDATE STATS ====================
        function updateStats() {
            document.getElementById('totalStudents').textContent = studentsData.length;
            
            const urgent = studentsData.filter(s => s.missing_count >= 3).length;
            document.getElementById('urgentCases').textContent = urgent;
        }

        // ==================== RENDER STUDENTS ====================
        function renderStudents() {
            const grid = document.getElementById('studentsGrid');
            
            if (filteredStudents.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-check-circle" style="color: #4CAF50;"></i>
                        <h3>All Good!</h3>
                        <p>No students with missing documents found.</p>
                        <a href="/history.html" class="btn btn-primary">
                            <i class="fas fa-database"></i> View All Records
                        </a>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = filteredStudents.map(student => {
                const missingCount = student.missing_count;
                
                return `
                    <div class="student-card" data-id="${student.id}">
                        <div class="student-card-header">
                            <div class="student-avatar">
                                ${getInitials(student.name)}
                            </div>
                            <div class="student-info">
                                <h3>${student.name || 'Unknown'}</h3>
                                <div class="student-meta">
                                    <span><i class="fas fa-id-card"></i> LRN: ${student.lrn || 'N/A'}</span>
                                    <span><i class="fas fa-calendar"></i> ${student.student_type || 'Regular'}</span>
                                </div>
                            </div>
                        </div>
                        <div class="student-card-body">
                            <div class="missing-docs-list">
                                ${renderMissingDocs(student.missing_documents)}
                            </div>
                            <div class="missing-count" style="display: inline-block; margin-bottom: 10px;">
                                ${missingCount} Missing Document${missingCount > 1 ? 's' : ''}
                            </div>
                            <div class="student-footer">
                                <div class="last-updated">
                                    <i class="far fa-clock"></i> Last updated: ${formatDate(student.updated_at)}
                                </div>
                                <div class="action-buttons">
                                    <button class="action-btn btn-remind" onclick="sendReminder(${student.user_id})" title="Send Reminder">
                                        <i class="fas fa-bell"></i>
                                    </button>
                                    <button class="action-btn btn-view" onclick="viewStudent(${student.id})" title="View Details">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderMissingDocs(docs) {
            if (!docs || docs.length === 0) return '<p class="text-muted">No missing documents</p>';
            
            return docs.map(doc => {
                let iconClass = 'fas fa-file';
                let docClass = '';
                let desc = '';
                
                switch(doc.type) {
                    case 'psa':
                        iconClass = 'fas fa-id-card';
                        docClass = 'psa';
                        desc = 'Required for identity verification';
                        break;
                    case 'form137':
                        iconClass = 'fas fa-file-contract';
                        docClass = 'f137';
                        desc = 'Permanent school record';
                        break;
                    case 'goodmoral':
                        iconClass = 'fas fa-certificate';
                        docClass = 'gm';
                        desc = 'Character clearance certificate';
                        break;
                    case 'honorable_dismissal':
                        iconClass = 'fas fa-file-signature';
                        docClass = 'hd';
                        desc = 'For transferee students';
                        break;
                    case 'transfer_credentials':
                        iconClass = 'fas fa-file-export';
                        docClass = 'tc';
                        desc = 'For transferee students';
                        break;
                    default:
                        iconClass = 'fas fa-file';
                        docClass = '';
                        desc = 'Required document';
                }
                
                return `
                    <div class="missing-doc-item">
                        <div class="doc-icon ${docClass}">
                            <i class="${iconClass}"></i>
                        </div>
                        <div class="doc-info">
                            <div class="doc-name">${doc.name}</div>
                            <div class="doc-desc">${desc}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ==================== HELPER FUNCTIONS ====================
        function getInitials(name) {
            if (!name) return '??';
            return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'Unknown';
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric'
                });
            } catch (e) {
                return 'Unknown';
            }
        }

        // ==================== FILTERS ====================
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const docType = document.getElementById('docTypeFilter').value;
            const college = document.getElementById('collegeFilter').value;
            
            filteredStudents = studentsData.filter(student => {
                // Search filter
                let matchesSearch = true;
                if (searchTerm !== '') {
                    matchesSearch = 
                        (student.name && student.name.toLowerCase().includes(searchTerm)) ||
                        (student.lrn && student.lrn.toLowerCase().includes(searchTerm)) ||
                        (student.college && student.college.toLowerCase().includes(searchTerm)) ||
                        (student.program && student.program.toLowerCase().includes(searchTerm));
                }
                
                // Document type filter
                let matchesDocType = true;
                if (docType !== '') {
                    matchesDocType = student.missing_documents && 
                        student.missing_documents.some(d => d.type === docType);
                }
                
                // College filter
                let matchesCollege = true;
                if (college !== '') {
                    matchesCollege = student.college === college;
                }
                
                return matchesSearch && matchesDocType && matchesCollege;
            });
            
            renderStudents();
            
            // Show filter result count
            showToast(`Found ${filteredStudents.length} student${filteredStudents.length !== 1 ? 's' : ''}`, 'info');
        }

        // ==================== ACTIONS ====================
        async function sendReminder(userId) {
            try {
                const response = await fetch('/api/missing-documents/remind-all', {
                    method: 'POST',
                    headers: {
                        'Authorization': localStorage.getItem('session_token'),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ user_id: userId })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    showToast(`Reminder sent successfully`, 'success');
                } else {
                    const error = await response.json();
                    showToast(error.error || 'Failed to send reminder', 'error');
                }
            } catch (error) {
                console.error('Error sending reminder:', error);
                showToast('Error sending reminder', 'error');
            }
        }

        async function sendBulkReminders() {
            if (filteredStudents.length === 0) {
                showToast('No students to remind', 'warning');
                return;
            }
            
            if (!confirm(`Send reminders to ${filteredStudents.length} student${filteredStudents.length !== 1 ? 's' : ''}?`)) {
                return;
            }
            
            try {
                const response = await fetch('/api/missing-documents/remind-all', {
                    method: 'POST',
                    headers: {
                        'Authorization': localStorage.getItem('session_token')
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    showToast(`Sent ${data.sent_count} reminder${data.sent_count !== 1 ? 's' : ''}`, 'success');
                } else {
                    const error = await response.json();
                    showToast(error.error || 'Failed to send reminders', 'error');
                }
            } catch (error) {
                console.error('Error sending bulk reminders:', error);
                showToast('Error sending reminders', 'error');
            }
        }

        function viewStudent(recordId) {
            // Store record ID in session storage and redirect to history with highlight
            sessionStorage.setItem('highlightRecord', recordId);
            window.location.href = `/history.html?highlight=${recordId}`;
        }

        function exportList() {
            if (filteredStudents.length === 0) {
                showToast('No data to export', 'warning');
                return;
            }
            
            try {
                const data = filteredStudents.map(s => ({
                    'Student Name': s.name || 'N/A',
                    'LRN': s.lrn || 'N/A',
                    'College': s.college || 'N/A',
                    'Program': s.program || 'N/A',
                    'Student Type': s.student_type || 'N/A',
                    'Missing Documents': s.missing_documents ? s.missing_documents.map(d => d.name).join(', ') : 'None',
                    'Missing Count': s.missing_count || 0,
                    'Last Updated': formatDate(s.updated_at),
                    'Status': s.status || 'N/A',
                    'Email': s.email || 'N/A',
                    'Contact': s.mobile_no || 'N/A'
                }));
                
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Missing Documents');
                
                // Auto-size columns
                const colWidths = [];
                for (let i = 0; i < Object.keys(data[0]).length; i++) {
                    colWidths.push({ wch: 20 });
                }
                ws['!cols'] = colWidths;
                
                const date = new Date().toISOString().split('T')[0];
                XLSX.writeFile(wb, `missing_documents_${date}.xlsx`);
                
                showToast(`Exported ${filteredStudents.length} record${filteredStudents.length !== 1 ? 's' : ''}`, 'success');
            } catch (error) {
                console.error('Export error:', error);
                showToast('Error exporting data', 'error');
            }
        }

        // ==================== NOTIFICATION TOAST ====================
        function showToast(message, type = 'success') {
            const toast = document.getElementById('notificationToast');
            const messageEl = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');
            
            // Set icon
            if (type === 'success') icon.className = 'fas fa-check-circle';
            else if (type === 'error') icon.className = 'fas fa-exclamation-circle';
            else if (type === 'warning') icon.className = 'fas fa-exclamation-triangle';
            else icon.className = 'fas fa-info-circle';
            
            // Set class
            toast.className = `notification-toast ${type}`;
            messageEl.textContent = message;
            
            // Show toast
            toast.classList.add('show');
            
            // Hide after 3 seconds
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ==================== LOGOUT ====================
        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
            } catch (e) {
                console.error('Logout error:', e);
            }
            localStorage.clear();
            window.location.href = '/login';
        }

        // ==================== CHECK FOR HIGHLIGHTED RECORD ====================
        // Check if coming from history page with highlight
        const urlParams = new URLSearchParams(window.location.search);
        const highlightId = urlParams.get('highlight');
        if (highlightId) {
            // Store in session to highlight later when data loads
            sessionStorage.setItem('highlightRecord', highlightId);
        }
    </script>
</body>
</html>
