<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>My Scanned Records | AssiScan</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f3d576;
            --gold-dark: #b8941c;
            --dark-red: #331010;
            --bg-dark: #050101;
            --bg-darker: #030000;
            --bg-card: rgba(20, 5, 5, 0.7);
            --bg-hover: rgba(212, 175, 55, 0.1);
            --text-light: #f0f0f0;
            --text-muted: #888;
            --border-color: rgba(212, 175, 55, 0.3);
            --border-radius: 6px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.7);
            --transition: all 0.3s ease;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --info: #17a2b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #1a0505 0%, #000 100%);
            color: var(--text-light);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* ===== LAYOUT ===== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* Mobile Menu Toggle */
        .mobile-menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1001;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--gold);
            width: 50px;
            height: 50px;
            border-radius: 8px;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .mobile-menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 999;
            backdrop-filter: blur(5px);
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            min-width: 250px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: black;
            box-shadow: var(--shadow);
            flex-shrink: 0;
        }

        .logo-text h1 {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.2);
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .logo-text p {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-light);
            text-decoration: none;
            border-radius: var(--border-radius);
            transition: var(--transition);
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            min-height: 44px;
            min-width: 44px;
        }

        .nav-link:hover {
            background: var(--bg-hover);
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2);
        }

        .nav-link.active {
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
            border-color: var(--gold);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(20, 5, 5, 0.7);
            border-radius: var(--border-radius);
            border: 1px solid rgba(212, 175, 55, 0.2);
            flex-shrink: 0;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-weight: 600;
            font-family: 'Cinzel', serif;
            flex-shrink: 0;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        #userName {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        #userRole {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* ===== COMPLETION STATUS ===== */
        .completion-status {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(5px);
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .status-title {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-complete {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid #28a745;
        }

        .status-incomplete {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }

        .status-missing {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
            border: 1px solid #dc3545;
        }

        .status-pending {
            background: rgba(33, 150, 243, 0.2);
            color: #2196F3;
            border: 1px solid #2196F3;
        }

        .status-approved {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid #4CAF50;
        }

        .status-rejected {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid #f44336;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .requirements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .requirement-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
        }

        .requirement-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .icon-complete {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
        }

        .icon-missing {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
        }

        .requirement-info {
            flex: 1;
        }

        .requirement-name {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .requirement-status {
            font-size: 10px;
            color: var(--text-muted);
        }

        .missing-list {
            margin-top: 15px;
            padding: 15px;
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid #dc3545;
            border-radius: var(--border-radius);
        }

        .missing-title {
            color: #dc3545;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .missing-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .missing-tag {
            padding: 4px 10px;
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            border-radius: 20px;
            color: #dc3545;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ===== STATS CARDS ===== */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(5px);
            min-height: 100px;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
            border-color: var(--gold);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--gold);
            flex-shrink: 0;
        }

        .stat-content h3 {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 4px;
            line-height: 1;
        }

        .stat-content p {
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ===== SEARCH AND FILTER ===== */
        .search-filter-container {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            padding-right: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: var(--text-light);
            border-radius: var(--border-radius);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            transition: var(--transition);
            outline: none;
            -webkit-appearance: none;
        }

        .search-box input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            background: rgba(0, 0, 0, 0.8);
        }

        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            pointer-events: none;
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: var(--border-radius);
            color: var(--text-light);
            cursor: pointer;
            transition: var(--transition);
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-height: 44px;
            min-width: 44px;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        /* ===== RECORDS GRID ===== */
        .records-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .record-card {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid rgba(212, 175, 55, 0.2);
            position: relative;
            backdrop-filter: blur(5px);
        }

        .record-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--gold);
        }

        .record-card-header {
            padding: 20px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(20, 5, 5, 0.5) 100%);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
            flex-wrap: wrap;
            gap: 10px;
        }

        .record-info h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 8px;
            line-height: 1.4;
            word-break: break-word;
        }

        .record-subtitle {
            color: var(--text-muted);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .record-id {
            display: inline-block;
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: bold;
            margin-bottom: 8px;
            border-left: 3px solid var(--gold);
        }

        .record-status {
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            align-self: flex-start;
            white-space: nowrap;
        }

        .status-pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }

        .status-complete {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid #28a745;
        }

        .status-sent {
            background: rgba(23, 162, 184, 0.2);
            color: #17a2b8;
            border: 1px solid #17a2b8;
        }

        .status-approved {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid #4CAF50;
        }

        .status-rejected {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid #f44336;
        }

        .status-needs-review {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
            border: 1px solid #ff9800;
        }

        .record-card-body {
            padding: 20px;
        }

        .record-details {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
            gap: 5px;
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: var(--text-muted);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .detail-value {
            color: var(--text-light);
            font-size: 11px;
            font-weight: 500;
            text-align: right;
            max-width: 60%;
            word-break: break-word;
        }

        .completion-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .badge-complete {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid #28a745;
        }

        .badge-incomplete {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }

        .badge-missing {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
            border: 1px solid #dc3545;
        }

        .goodmoral-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .badge-good {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid #28a745;
        }

        .badge-fair {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }

        .badge-poor {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
            border: 1px solid #dc3545;
        }

        /* Document Previews */
        .document-preview {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
        }

        .document-thumbnail {
            width: 70px;
            height: 70px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            overflow: hidden;
            position: relative;
        }

        .document-thumbnail:hover {
            transform: scale(1.05);
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .document-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .document-thumbnail i {
            font-size: 30px;
            color: var(--gold);
        }

        .document-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: var(--gold);
            font-size: 8px;
            text-align: center;
            padding: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .missing-document {
            opacity: 0.5;
            filter: grayscale(100%);
            border-color: #dc3545;
        }

        .record-actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--border-radius);
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex: 1;
            justify-content: center;
            min-height: 44px;
            min-width: 44px;
        }

        .btn-primary {
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
            border: 1px solid var(--gold);
        }

        .btn-primary:hover {
            background: var(--gold);
            color: black;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-light);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .btn-warning {
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
            border: 1px solid #ffc107;
        }

        .btn-warning:hover {
            background: #ffc107;
            color: black;
            transform: translateY(-2px);
        }

        .btn-success {
            background: rgba(40, 167, 69, 0.15);
            color: #28a745;
            border: 1px solid #28a745;
        }

        .btn-success:hover {
            background: #28a745;
            color: white;
            transform: translateY(-2px);
        }

        .btn-info {
            background: rgba(33, 150, 243, 0.15);
            color: #2196F3;
            border: 1px solid #2196F3;
        }

        .btn-info:hover {
            background: #2196F3;
            color: white;
        }

        /* Edit Mode */
        .edit-mode {
            display: none;
        }

        .edit-form {
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            border-radius: 4px;
            font-size: 13px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--gold);
            outline: none;
        }

        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .form-row .form-group {
            flex: 1;
            min-width: 200px;
        }

        .edit-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .needs-review-badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(255, 152, 0, 0.2);
            border: 1px solid #ff9800;
            color: #ff9800;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            margin-left: 10px;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: var(--border-radius);
            background: var(--bg-card);
            margin-top: 20px;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 20px;
            color: rgba(212, 175, 55, 0.5);
        }

        .empty-state h3 {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .empty-state p {
            max-width: 400px;
            margin: 0 auto 20px;
            line-height: 1.6;
            font-size: 14px;
        }

        /* ===== LOADING ===== */
        .loading-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
            color: var(--gold);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(212, 175, 55, 0.3);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== MODALS ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-container {
            background: #121212;
            border: 1px solid var(--gold);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            background: rgba(212, 175, 55, 0.1);
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            position: sticky;
            top: 0;
            background: #121212;
            z-index: 10;
        }

        .modal-header h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
            flex: 1;
        }

        .close-modal {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            min-height: 44px;
            min-width: 44px;
        }

        .close-modal:hover {
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
        }

        .modal-body {
            padding: 20px;
            color: #ddd;
        }

        /* ===== IMAGE VIEWER MODAL ===== */
        .image-viewer-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.98);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .image-viewer-content {
            max-width: 95vw;
            max-height: 95vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .image-viewer-content img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border: 2px solid var(--gold);
            border-radius: 4px;
            box-shadow: var(--shadow-lg);
        }

        .image-viewer-close {
            position: absolute;
            top: -45px;
            right: -45px;
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid var(--gold);
            color: var(--gold);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: var(--transition);
        }

        .image-viewer-close:hover {
            background: var(--gold);
            color: black;
            transform: scale(1.1);
        }

        .image-viewer-nav {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid var(--gold);
        }

        .image-viewer-nav button {
            background: none;
            border: none;
            color: var(--gold);
            font-size: 20px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .image-viewer-nav button:hover {
            background: rgba(212, 175, 55, 0.2);
        }

        .image-viewer-nav button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ===== DOCUMENTS SECTION ===== */
        .documents-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .documents-section:first-child {
            margin-top: 0;
            padding-top: 0;
            border-top: none;
        }

        .section-title {
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .document-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .document-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
        }

        .document-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .document-preview-img {
            width: 100%;
            height: 120px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border-color);
        }

        .document-preview-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .document-preview-img i {
            font-size: 40px;
            color: var(--gold);
        }

        .document-info {
            padding: 10px;
        }

        .document-title {
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--gold);
        }

        .document-filename {
            font-size: 9px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .document-actions {
            display: flex;
            gap: 5px;
            padding: 10px;
            border-top: 1px solid var(--border-color);
        }

        .document-actions .btn-small {
            flex: 1;
            padding: 6px;
            font-size: 10px;
            min-height: 32px;
        }

        /* ===== DETAILS GRID ===== */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .details-group {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            padding: 15px;
        }

        .details-group h4 {
            color: var(--gold);
            font-size: 14px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 5px;
        }

        .details-row {
            display: flex;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .details-label {
            width: 40%;
            color: var(--text-muted);
        }

        .details-value {
            width: 60%;
            color: var(--text-light);
            font-weight: 500;
        }

        /* ===== NOTIFICATION ===== */
        .notification {
            position: fixed;
            top: 30px;
            right: 30px;
            padding: 15px 20px;
            border-radius: var(--border-radius);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-lg);
            z-index: 1100;
            transform: translateX(400px);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            max-width: 400px;
            backdrop-filter: blur(5px);
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            background: rgba(40, 167, 69, 0.9);
            color: white;
            border-left: 4px solid #28a745;
            border: 1px solid #28a745;
        }

        .notification.error {
            background: rgba(220, 53, 69, 0.9);
            color: white;
            border-left: 4px solid #dc3545;
            border: 1px solid #dc3545;
        }

        .notification.info {
            background: rgba(23, 162, 184, 0.9);
            color: white;
            border-left: 4px solid #17a2b8;
            border: 1px solid #17a2b8;
        }

        .notification.warning {
            background: rgba(255, 193, 7, 0.9);
            color: black;
            border-left: 4px solid #ffc107;
            border: 1px solid #ffc107;
        }

        /* ===== RESPONSIVE DESIGN ===== */
        @media (max-width: 1024px) {
            .records-grid {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            }
            
            .stat-card {
                padding: 15px;
            }
            
            .stat-content h3 {
                font-size: 24px;
            }
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: flex;
            }
            
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 15px;
            }
            
            .logo-container {
                min-width: auto;
            }
            
            .nav-links {
                flex-direction: column;
                width: 100%;
            }
            
            .nav-link {
                width: 100%;
                justify-content: center;
            }
            
            .user-info {
                width: 100%;
                justify-content: center;
            }
            
            .user-details {
                align-items: center;
            }
            
            #userName {
                max-width: 100%;
                text-align: center;
            }
            
            .search-filter-container {
                flex-direction: column;
            }
            
            .search-box {
                min-width: 100%;
            }
            
            .records-grid {
                grid-template-columns: 1fr;
            }
            
            .record-status {
                position: relative;
                top: 0;
                right: 0;
                align-self: flex-start;
            }
            
            .record-card-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .modal-container {
                max-height: 95vh;
            }
            
            .document-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            }
            
            .image-viewer-close {

            }
            
            .image-viewer-nav {
                bottom: 20px;
            }
            
            .details-grid {
                grid-template-columns: 1fr;
            }
            
            .requirements-grid {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                flex-direction: column;
                gap: 10px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 10px;
            }
            
            body {
                padding: 15px 10px;

            .stats-container {
                grid-template-columns: 1fr;

            .stat-card {
                flex-direction: column;

            }
            
            .stat-content h3 {
                font-size: 22px;
            }
            
            .record-actions {
                flex-direction: column;
            }
            
            .record-actions .btn {
                width: 100%;
            }
            
            .detail-item {
                flex-direction: column;

            .detail-value {
                max-width: 100%;

            }
            
            .filter-buttons {

            }
            
            .filter-btn {
                flex: 1;
                min-width: 100px;
                text-align: center;

            .modal-header {
                padding: 15px;
            }
            
            .modal-body {
                padding: 15px;
            }
            
            .document-grid {
                grid-template-columns: 1fr;

            .notification {

            .image-viewer-nav {

            .document-thumbnail {

            }
            
            .status-header {

            .edit-actions {

        /* Touch-friendly improvements */
        button, 
        input[type="button"],
        input[type="submit"],
        .btn,

<body>
    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
        <i class="fas fa-bars"></i>
    </button>
    
    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu-overlay" onclick="toggleMobileMenu()"></div>

    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <div class="logo-container">
                <div class="logo-icon">
                    <i class="fas fa-file-alt"></i>
                </div>
                <div class="logo-text">
                    <h1>My Records</h1>
                    <p>View and manage your information</p>
                </div>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="/my-records" class="nav-link active">
                    <i class="fas fa-file-alt"></i>
                    <span>My Records</span>
                </a>
                <a href="/notifications" class="nav-link">
                    <i class="fas fa-bell"></i>
                    <span>Notifications</span>
                </a>
                <a href="#" onclick="logout()" class="nav-link">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </div>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="user-details">
                    <div id="userName">Loading...</div>
                    <div id="userRole">Student</div>
                </div>
            </div>
        </header>

        <!-- RECORD DETAILS (Will be populated) -->
        <div id="recordContainer"></div>

        <!-- NOTIFICATION -->
        <div id="notification" class="notification">
            <i class="fas fa-check-circle"></i>
            <span id="notificationMessage">Operation successful!</span>
        </div>
    </div>

    <script>
        let currentRecord = null;
        let currentUser = null;
        let isMobileMenuOpen = false;
        let isEditMode = false;
        let collegesData = [];
        let programsData = [];

        // Mobile menu functions
        function toggleMobileMenu() {
            const overlay = document.querySelector('.mobile-menu-overlay');
            const toggleBtn = document.querySelector('.mobile-menu-toggle');
            
            isMobileMenuOpen = !isMobileMenuOpen;
            
            if (isMobileMenuOpen) {
                overlay.style.display = 'block';
                toggleBtn.innerHTML = '<i class="fas fa-times"></i>';
                document.body.style.overflow = 'hidden';
            } else {
                overlay.style.display = 'none';
                toggleBtn.innerHTML = '<i class="fas fa-bars"></i>';
                document.body.style.overflow = 'auto';
            }
        }

        function closeMobileMenu() {
            const overlay = document.querySelector('.mobile-menu-overlay');
            const toggleBtn = document.querySelector('.mobile-menu-toggle');
            
            overlay.style.display = 'none';
            toggleBtn.innerHTML = '<i class="fas fa-bars"></i>';
            document.body.style.overflow = 'auto';
            isMobileMenuOpen = false;
        }

        // Initialize
        window.addEventListener('load', function() {
            checkAuth();
            loadColleges();
            loadMyRecord();
        });

        // Check authentication
        async function checkAuth() {
            try {
                const response = await fetch('/api/check-session');
                const data = await response.json();
                
                if (!data.authenticated) {
                    window.location.href = '/login';
                    return;
                }
                
                if (data.user.role !== 'STUDENT') {
                    window.location.href = '/';
                    return;
                }
                
                currentUser = data.user;
                document.getElementById('userName').textContent = currentUser.full_name || currentUser.username;
                
                const initials = (currentUser.full_name || currentUser.username).substring(0, 2).toUpperCase();
                document.getElementById('userAvatar').textContent = initials;
                
            } catch (error) {
                console.error('Auth error:', error);
                window.location.href = '/login';
            }
        }

        // Load colleges for dropdown
        async function loadColleges() {
            try {
                const response = await fetch('/api/colleges-dropdown');
                if (response.ok) {
                    const data = await response.json();
                    collegesData = data;
                    
                    // Flatten programs
                    programsData = [];
                    data.forEach(college => {
                        if (college.programs) {
                            college.programs.forEach(program => {
                                programsData.push({
                                    ...program,
                                    college_id: college.id,
                                    college_name: college.name
                                });
                            });
                        }
                    });
                }
            } catch (error) {
                console.error('Error loading colleges:', error);
            }
        }

        // Load my record
        async function loadMyRecord() {
            const container = document.getElementById('recordContainer');
            
            try {
                const response = await fetch('/api/my-records');
                
                if (response.ok) {
                    const data = await response.json();
                    
                    if (data.records && data.records.length > 0) {
                        currentRecord = data.records[0];
                        renderRecord();
                    } else {
                        container.innerHTML = `
                            <div class="empty-state">
                                <i class="fas fa-file-alt"></i>
                                <h3>No Record Found</h3>
                                <p>You don't have any scanned records yet. Please visit the Admissions Office.</p>
                                <a href="/" class="btn btn-primary">
                                    <i class="fas fa-home"></i> Go to Home
                                </a>
                            </div>
                        `;
                    }
                } else {
                    throw new Error('Failed to load record');
                }
            } catch (error) {
                console.error('Error loading record:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error Loading Record</h3>
                        <p>Please try again later.</p>
                        <button class="btn btn-primary" onclick="loadMyRecord()">
                            <i class="fas fa-sync-alt"></i> Retry
                        </button>
                    </div>
                `;
            }
        }

        // Render record (view mode)
        function renderRecord() {
            const container = document.getElementById('recordContainer');
            const record = currentRecord;
            
            // Calculate completion
            const fieldStats = checkFieldCompletion(record);
            const docStats = checkDocumentCompletion(record);
            const totalRequired = fieldStats.total + docStats.total;
            const completed = fieldStats.completed + docStats.completed;
            const completionPercentage = Math.round((completed / totalRequired) * 100);
            
            // Determine status
            let statusClass = 'status-incomplete';
            let statusText = 'INCOMPLETE';
            
            if (record.needs_review) {
                statusClass = 'status-needs-review';
                statusText = 'NEEDS REVIEW';
            } else if (record.status === 'PENDING') {
                statusClass = 'status-pending';
                statusText = 'PENDING';
            } else if (record.status === 'APPROVED') {
                statusClass = 'status-approved';
                statusText = 'APPROVED';
            } else if (record.status === 'REJECTED') {
                statusClass = 'status-rejected';
                statusText = 'REJECTED';
            }
            
            // Format date
            const createdDate = record.created_at ? new Date(record.created_at).toLocaleDateString() : 'Unknown';
            
            // Get good moral status
            let moralStatus = 'Not analyzed';
            if (record.goodmoral_score) {
                if (record.goodmoral_score >= 80) moralStatus = 'Good';
                else if (record.goodmoral_score >= 60) moralStatus = 'Fair';
                else moralStatus = 'Poor';
            }
            
            container.innerHTML = `
                <!-- Status Summary -->
                <div class="completion-status">
                    <div class="status-header">
                        <div class="status-title">
                            <i class="fas fa-clipboard-check"></i>
                            Application Status
                        </div>
                        <div class="status-badge ${statusClass}">
                            ${statusText}
                            ${record.needs_review ? '<span class="needs-review-badge">UNDER REVIEW</span>' : ''}
                        </div>
                    </div>
                    
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${completionPercentage}%"></div>

        // Save changes
        async function saveChanges() {
            const updatedData = {
                name: document.getElementById('edit_name')?.value,
                sex: document.getElementById('edit_sex')?.value,
                birthdate: document.getElementById('edit_birthdate')?.value,
                birthplace: document.getElementById('edit_birthplace')?.value,
                civil_status: document.getElementById('edit_civil_status')?.value,
                religion: document.getElementById('edit_religion')?.value,
                mobile_no: document.getElementById('edit_mobile_no')?.value,
                email: document.getElementById('edit_email')?.value,
                province: document.getElementById('edit_province')?.value,
                specific_address: document.getElementById('edit_specific_address')?.value,
                mother_name: document.getElementById('edit_mother_name')?.value,
                mother_contact: document.getElementById('edit_mother_contact')?.value,
                father_name: document.getElementById('edit_father_name')?.value,
                father_contact: document.getElementById('edit_father_contact')?.value,
                guardian_name: document.getElementById('edit_guardian_name')?.value,
                guardian_relation: document.getElementById('edit_guardian_relation')?.value,
                guardian_contact: document.getElementById('edit_guardian_contact')?.value,
                lrn: document.getElementById('edit_lrn')?.value,
                school_name: document.getElementById('edit_school_name')?.value,
                college: document.getElementById('edit_college')?.value,
                program: document.getElementById('edit_program')?.value,
                student_type: document.getElementById('edit_student_type')?.value,
                final_general_average: document.getElementById('edit_final_general_average')?.value
            };
            
            // Validate required fields
            if (!updatedData.name) {
                showNotification('Name is required', 'error');
                return;
            }
            
            if (!updatedData.sex) {
                showNotification('Sex is required', 'error');
                return;
            }
            
            if (!updatedData.birthdate) {
                showNotification('Birthdate is required', 'error');
                return;
            }
            
            const saveBtn = document.querySelector('.edit-actions .btn-success');
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            saveBtn.disabled = true;
            
            try {
                const response = await fetch('/api/student/update-info', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': localStorage.getItem('session_token')
                    },
                    body: JSON.stringify(updatedData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showNotification('Information updated successfully! Admin will review your changes.', 'success');
                    
                    // Reload record
                    await loadMyRecord();
                    
                    // Exit edit mode
                    isEditMode = false;
                } else {
                    showNotification(data.error || 'Failed to update information', 'error');
                    saveBtn.innerHTML = originalText;
                    saveBtn.disabled = false;
                }
            } catch (error) {
                console.error('Error saving changes:', error);
                showNotification('Connection error', 'error');
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
            }
        }

        const REQUIRED_FIELDS = [
            { key: 'name', label: 'Full Name', category: 'personal' },
            { key: 'sex', label: 'Sex', category: 'personal' },
            { key: 'birthdate', label: 'Birthdate', category: 'personal' },

            { key: 'program', label: 'Program', category: 'academic' },
            { key: 'student_type', label: 'Student Type', category: 'academic' }
        ];

        const REQUIRED_DOCUMENTS = [
            { key: 'image_path', label: 'PSA Birth Certificate' },
            { key: 'form137_path', label: 'Form 137' },
            { key: 'goodmoral_path', label: 'Good Moral Certificate' }
        ];

        function checkFieldCompletion(record) {
            const stats = {
                total: 0,
                completed: 0,
                missing: [],
                categories: {
                    personal: { total: 0, completed: 0 },
                    contact: { total: 0, completed: 0 },
                    academic: { total: 0, completed: 0 },
                    parent: { total: 0, completed: 0 }
                }
            };
            
            REQUIRED_FIELDS.forEach(field => {
                stats.total++;
                stats.categories[field.category].total++;
                
                const value = record[field.key];
                if (value && value !== '' && value !== 'N/A' && value !== null && value !== undefined) {
                    stats.completed++;
                    stats.categories[field.category].completed++;
                } else {
                    stats.missing.push(field.label);
                }
            });
            
            return stats;
        }

        function checkDocumentCompletion(record) {
            const stats = {
                total: REQUIRED_DOCUMENTS.length,
                completed: 0,
                missing: []
            };
            
            REQUIRED_DOCUMENTS.forEach(doc => {
                const value = record[doc.key];
                if (value && value !== '' && value !== null && value !== undefined) {
                    stats.completed++;
                } else {
                    stats.missing.push(doc.label);
                }
            });
            
            return stats;
        }

        // Get document previews
        function getDocumentPreviews(record) {
            const previews = [];
            
            function addPreview(path, label) {
                if (!path) return;
                
                const paths = path.split(',');
                paths.forEach(p => {
                    if (p.trim()) {
                        const isImage = p.trim().match(/\.(jpg|jpeg|png|gif)$/i);
                        const url = `${window.location.origin}/uploads/${p.trim()}`;
                        
                        previews.push(`
                            <div class="document-thumbnail" onclick="window.open('${url}', '_blank')" title="${label}">
                                ${isImage ? 
                                    `<img src="${url}" alt="${label}">` : 
                                    `<i class="fas fa-file-pdf"></i>`
                                }
                                <span class="document-label">${label}</span>
                            </div>
                        `);
                    }
                });
            }
            
            addPreview(record.image_path, 'PSA');
            addPreview(record.form137_path, 'Form 137');
            addPreview(record.goodmoral_path, 'Good Moral');
            
            if (record.other_documents && Array.isArray(record.other_documents)) {
                record.other_documents.forEach(doc => {
                    if (doc.filename) {
                        addPreview(doc.filename, doc.title || 'Doc');
                    }
                });
            }
            
            if (previews.length > 0) {
                return `
                    <div class="document-preview">
                        ${previews.join('')}
                    </div>
                `;
            }
            
            return '';
        }

        // Modal functions
        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
            document.body.style.overflow = 'hidden';
            closeMobileMenu();
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Notification
        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            const messageEl = document.getElementById('notificationMessage');
            const icon = notification.querySelector('i');
            
            icon.className = {
                'success': 'fas fa-check-circle',
                'error': 'fas fa-exclamation-circle',
                'info': 'fas fa-info-circle',
                'warning': 'fas fa-exclamation-triangle'
            }[type] || 'fas fa-info-circle';
            
            notification.className = `notification ${type}`;
            messageEl.textContent = message;
            
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Logout
        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
            } catch (error) {
                console.error('Logout error:', error);
            }
            
            window.location.href = '/login';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modals = document.querySelectorAll('.modal-overlay');
            modals.forEach(modal => {
                if (event.target === modal) {
                    closeModal(modal.id);
                }
            });
        };
    </script>
</body>
</html>
